<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Enterprise Control Tower</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🧠 Enterprise Control Tower</h1>

<div class="kpi-container">
<div class="kpi">Total Perdas<br><span id="kpi-total"></span></div>
<div class="kpi">Média<br><span id="kpi-media"></span></div>
<div class="kpi">Score Risco<br><span id="kpi-score"></span></div>
</div>

<div class="card">
<h3>📈 Tendência Geral</h3>
<canvas id="graficoGeral"></canvas>
</div>

<div class="card">
<h3>🏆 Ranking de Risco</h3>
<div id="ranking"></div>
</div>

<div class="card">
<h3>📍 Monitoramento por Loja</h3>

<select id="seletorLoja"></select>

<canvas id="graficoLoja"></canvas>
<canvas id="graficoComparativo"></canvas>

<div id="alertas"></div>

</div>

<script src="script.js"></script>

</body>
</html>
