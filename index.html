<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Inteligência de Perdas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    margin:2rem;
    background:#f4f6fb;
}

.kpi-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1rem;
    margin-bottom:2rem;
}

.kpi{
    background:white;
    padding:1rem;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
    box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.alerta{
    color:#c20000;
}

.grafico-container{
    background:white;
    padding:1rem;
    border-radius:10px;
    margin-bottom:2rem;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-radius:6px;
    margin:5px 0;
}

.risco-alto{ background:#ffdddd;color:#a80000; }
.risco-medio{ background:#fff3cd;color:#856404; }
.risco-baixo{ background:#ddffdd;color:#1e7e34; }

</style>

</head>

<body>

<h1>🧠 Inteligência de Prevenção de Perdas</h1>

<div class="kpi-container">
<div class="kpi">Total Perdas<br><span id="kpi-total"></span></div>
<div class="kpi">Média Mensal<br><span id="kpi-media"></span></div>
<div class="kpi">Status<br><span id="kpi-alerta"></span></div>
</div>

<div class="grafico-container">
<h2>📈 Tendência de Perdas</h2>
<canvas id="graficoTendencia"></canvas>
</div>

<div class="grafico-container">
<h2>🏆 Ranking Mensal</h2>
<div id="ranking"></div>
</div>

<script src="script.js"></script>

</body>
</html>
