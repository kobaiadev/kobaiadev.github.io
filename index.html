<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enterprise Loss Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ============================
BASE
============================ */

*{
    box-sizing:border-box;
}

body{
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    sans-serif;

    background:linear-gradient(135deg,#020617,#0f172a);
    color:#e2e8f0;

    max-width:1300px;
    margin:auto;
    padding:2rem;
}

/* ============================
HEADER
============================ */

h1{
    color:#38bdf8;
}

/* ============================
KPI
============================ */

.kpi-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:1rem;
    margin-bottom:2rem;
}

.kpi{
    background:rgba(255,255,255,.05);
    padding:1.2rem;
    border-radius:14px;

    text-align:center;
    font-weight:bold;

    backdrop-filter:blur(10px);

    transition:.3s;
}

.kpi:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,.08);
}

/* ============================
CARDS
============================ */

.card{
    background:rgba(255,255,255,.04);
    padding:1.5rem;
    border-radius:16px;
    margin-bottom:2rem;

    box-shadow:0 10px 40px rgba(0,0,0,.3);
}

/* ============================
RISK COLORS
============================ */

.risco-alto{
    background:#7f1d1d;
    color:#fecaca;
}

.risco-medio{
    background:#854d0e;
    color:#fef3c7;
}

.risco-baixo{
    background:#14532d;
    color:#dcfce7;
}

/* ============================
ALERT
============================ */

.alerta{
    background:#991b1b;
    padding:12px;
    border-radius:10px;
    margin-top:10px;
}

/* ============================
SELECT
============================ */

select{
    padding:10px;
    border-radius:8px;
    border:none;
    margin-bottom:1rem;
}

/* ============================
RANKING
============================ */

#ranking{
    max-height:400px;
    overflow:auto;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-radius:8px;
    margin-bottom:6px;
}

/* ============================
CANVAS
============================ */

canvas{
    width:100% !important;
    height:400px !important;
}

</style>

</head>

<body>

<h1>🧠 Enterprise Loss Intelligence</h1>

<div class="kpi-container">
<div class="kpi">Total<br><span id="kpi-total"></span></div>
<div class="kpi">Média<br><span id="kpi-media"></span></div>
<div class="kpi">Score Risco<br><span id="kpi-score"></span></div>
</div>

<div class="card">
<h2>📈 Tendência Geral</h2>
<canvas id="graficoGeral"></canvas>
</div>

<div class="card">
<h2>🏆 Ranking Estratégico</h2>
<div id="ranking"></div>
</div>

<div class="card">

<h2>📍 Análise por Loja</h2>

<select id="seletorLoja"></select>

<canvas id="graficoLoja"></canvas>

<div id="alertas"></div>

</div>

<script src="script.js"></script>

</body>
</html>
