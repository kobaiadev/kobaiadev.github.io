<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Inteligência de Perdas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
RESET E BASE
========================= */

*{
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;

    background:linear-gradient(135deg,#f5f7fa,#e4e8f0);

    max-width:1200px;
    margin:auto;
    padding:2rem;

    color:#222;
}

/* =========================
TITULOS
========================= */

h1{
    color:#0b3d91;
    font-weight:600;
    margin-bottom:1.5rem;
}

/* =========================
KPIs
========================= */

.kpi-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:1rem;
    margin-bottom:2rem;
}

.kpi{
    background:white;
    padding:1rem;
    border-radius:12px;

    text-align:center;
    font-weight:bold;

    transition:.3s;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.kpi:hover{
    transform:translateY(-3px);
}

/* =========================
CARDS
========================= */

.grafico-container{
    background:white;
    padding:1rem;
    border-radius:12px;
    margin-bottom:2rem;

    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

/* =========================
RANKING
========================= */

#ranking{
    max-height:400px;
    overflow-y:auto;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-radius:6px;
    margin:5px 0;
}

/* =========================
RISCO
========================= */

.risco-alto{
    background:#ffdddd;
    color:#a80000;
}

.risco-medio{
    background:#fff3cd;
    color:#856404;
}

.risco-baixo{
    background:#ddffdd;
    color:#1e7e34;
}

/* =========================
ALERTAS
========================= */

.alerta-critico{
    background:#ffe6e6;
    color:#c20000;
    font-weight:bold;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}

/* =========================
RESPONSIVO
========================= */

@media(max-width:768px){

    body{
        margin:1rem;
        padding:1rem;
    }

    h1{
        font-size:1.6rem;
    }

}

</style>

</head>

<body>

<h1>🧠 Dashboard Inteligência de Perdas</h1>

<div class="kpi-container">
<div class="kpi">Total<br><span id="kpi-total"></span></div>
<div class="kpi">Média<br><span id="kpi-media"></span></div>
<div class="kpi">Status<br><span id="kpi-status"></span></div>
</div>

<div class="grafico-container">
<h2>📈 Predição Geral</h2>
<canvas id="graficoPredicao"></canvas>
</div>

<div class="grafico-container">
<h2>🏆 Ranking</h2>
<div id="ranking"></div>
</div>

<div class="grafico-container">

<h2>📍 Análise Individual</h2>

<select id="seletorLoja"></select>

<canvas id="graficoLoja"></canvas>

<div id="alertasLoja"></div>

</div>

<script src="script.js"></script>

</body>
</html>
