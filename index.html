<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Comparativo de Perdas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f3f3f3;
    margin:2rem;
    color:#222;
}

h1{
    color:#0066cc;
}

.grafico-container{
    background:white;
    padding:1rem;
    margin-bottom:2rem;
    border-radius:8px;
    border:1px solid #ccc;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
}

canvas{
    width:100% !important;
    height:400px !important;
}

</style>

</head>

<body>

<h1>📊 Comparativo de Perdas</h1>

<!-- GRÁFICO GERAL -->
<div class="grafico-container">
<h2>Geral - Todas as Lojas</h2>
<canvas id="graficoGeral"></canvas>
</div>

<!-- GRÁFICOS POR LOJA -->
<div id="graficos-lojas"></div>

<!-- Script -->
<script src="script.js"></script>

</body>
</html>
