<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Inteligência de Perdas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:Arial;
    margin:2rem;
    background:linear-gradient(135deg,#f5f7fa,#e4e8f0);
}

h1{
    color:#0b3d91;
}

.grafico-container{
    background:white;
    padding:1rem;
    border-radius:12px;
    margin-bottom:2rem;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.kpi-container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1rem;
    margin-bottom:2rem;
}

.kpi{
    background:white;
    padding:1rem;
    border-radius:10px;
    text-align:center;
    font-weight:bold;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-radius:6px;
    margin:5px 0;
}

.risco-alto{ background:#ffdddd;color:#a80000; }
.risco-medio{ background:#fff3cd;color:#856404; }
.risco-baixo{ background:#ddffdd;color:#1e7e34; }

.alerta-critico{
    color:#c20000;
    font-weight:bold;
}

</style>

</head>

<body>

<h1>🧠 Dashboard Inteligência de Perdas</h1>

<div class="kpi-container">
<div class="kpi">Total<br><span id="kpi-total"></span></div>
<div class="kpi">Média<br><span id="kpi-media"></span></div>
<div class="kpi">Status<br><span id="kpi-status"></span></div>
</div>

<div class="grafico-container">
<h2>📈 Predição Geral</h2>
<canvas id="graficoPredicao"></canvas>
</div>

<div class="grafico-container">
<h2>🏆 Ranking</h2>
<div id="ranking"></div>
</div>

<div class="grafico-container">
<h2>📍 Análise Individual</h2>

<select id="seletorLoja"></select>

<canvas id="graficoLoja"></canvas>

<div id="alertasLoja"></div>

</div>

<script src="script.js"></script>

</body>
</html>
