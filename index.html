<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Master Control Tower Loss Intelligence</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🧠 Master Control Tower</h1>

<div class="kpi-container">

Total Perdas<br>
<span id="kpi-total"></span>
</div>

<div class="kpi">
Média Perdas<br>
<span id="kpi-media"></span>
</div>

<div class="kpi">
Score Risco<br>
<span id="kpi-score"></span>
</div>

<div class="kpi">
Previsão Próximo Mês<br>
<span id="kpi-previsao"></span>
</div>

</div>

<div class="card">
<h2>📈 Tendência Inteligente</h2>
<canvas id="graficoGeral"></canvas>
</div>

<div class="card">
<h2>🏆 Ranking Estratégico</h2>
<div id="ranking"></div>
</div>

<div class="card">
<h2>📍 Monitoramento por Loja</h2>

<select id="seletorLoja"></select>

<canvas id="graficoLoja"></canvas>

<div id="alertas"></div>

</div>

<script src="script.js"></script>

</body>
</html>
