<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Control Tower</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
max-width:1300px;
margin:auto;
padding:2rem;
}

.card{
background:rgba(255,255,255,.05);
padding:1.5rem;
border-radius:15px;
margin-bottom:2rem;
}

select{
padding:10px;
border-radius:8px;
border:none;
margin-bottom:1rem;
}

canvas{
width:100%!important;
height:400px!important;
}

</style>

</head>

<body>

<h1>🧠 Control Tower Loss Intelligence</h1>

<div class="card">
<h3>KPI</h3>
<p>Total: <span id="kpi-total"></span></p>
<p>Média: <span id="kpi-media"></span></p>
</div>

<div class="card">
<h3>Selecione a Loja</h3>
<select id="seletorLoja"></select>

<h3>Predição</h3>
<canvas id="graficoLoja"></canvas>

<h3>Comparativo Anual</h3>
<canvas id="graficoComparativo"></canvas>
</div>

<script src="script.js"></script>

</body>
</html>
