<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enterprise Control Tower</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🧠 Control Tower - Inteligência de Perdas</h1>

<div class="kpi-container">
<div class="kpi">Total<br><span id="kpi-total"></span></div>
<div class="kpi">Média<br><span id="kpi-media"></span></div>
<div class="kpi">Score Risco<br><span id="kpi-score"></span></div>
</div>

<div class="card">
<h2>📈 Tendência Geral</h2>
<canvas id="graficoGeral"></canvas>
</div>

<div class="card">
<h2>🏆 Ranking Estratégico</h2>
<div id="ranking"></div>
</div>

<div class="card">
<h2>📍 Monitoramento por Loja</h2>

<select id="seletorLoja"></select>

<h3>Predição + Tendência</h3>
<canvas id="graficoLoja"></canvas>

<h3>Comparativo Anual</h3>
<canvas id="graficoComparativo"></canvas>

<div id="alertas"></div>

</div>

<script src="script.js"></script>

</body>
</html>
